      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 350px;
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      text-align: center;
      color: white;
    }

  .logo {
  width: 85px;
  height: 85px;
  margin: 0 auto 15px;
  border-radius: 50%;
  
  
  background: rgba(255, 255, 255, 0.08);
  
  
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  
  border: 1px solid rgba(255, 255, 255, 0.2);

  
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);

  display: flex;
  align-items: center;
  justify-content: center;
    }

    .logo img {
    width: 60px;
    height: 60px;
    object-fit: contain;
    }

    h2 {
      font-weight: 600;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 12px;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    .input-group {
      position: relative;
      margin-bottom: 15px;
    }

    .input-group input {
      width: 100%;
      padding: 10px 40px;
      border-radius: 25px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.2);
      color: white;
    }

    .input-group input::placeholder {
      color: rgba(255,255,255,0.7);
    }

    .input-group i {
      position: absolute;
      top: 50%;
      left: 12px;
      transform: translateY(-50%);
      font-size: 14px;
      opacity: 0.7;
    }

     .icon {
      position: absolute;
      top: 50%;
      left: 12px;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      object-fit: contain;
      opacity: 0.7;
    }

    .forgot {
      text-align: right;
      font-size: 12px;
      margin-bottom: 15px;
      cursor: pointer;
      opacity: 0.8;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 25px;
      background: rgba(0,0,0,0.5);
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: rgba(0,0,0,0.7);
    }

    .divider {
      margin: 15px 0;
      font-size: 12px;
      opacity: 0.7;
    }

    .social {
      display: flex;
      justify-content: center;
      gap: 15px;
    }
    
    .social-icon {
    width: 22px;
    height: 22px;
    object-fit: contain;
    }

    .social div {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .forgot {
      color: black;
      opacity: 1; 
    }

    .divider {
      color: black;
      opacity: 1;
    }

  </style>
</head>
